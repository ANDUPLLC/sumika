<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUMIKA プロジェクト</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 14px; padding: 16px; max-width: 600px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .subtitle { font-size: 12px; color: #666; margin-bottom: 16px; }
  .badge { font-size: 11px; background: #E6F1FB; color: #185FA5; border: 0.5px solid #85B7EB; border-radius: 20px; padding: 2px 10px; font-weight: 500; }
  .links { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .link-btn { font-size: 12px; color: #185FA5; text-decoration: none; background: #fff; border: 0.5px solid #ddd; border-radius: 8px; padding: 6px 12px; }
  .section { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.1); padding: 14px; margin-bottom: 14px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .section-title { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.06em; }
  .progress-bar { height: 6px; background: #eee; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
  .progress-fill { height: 100%; background: #185FA5; border-radius: 3px; }
  .progress-label { font-size: 11px; color: #666; }
  .task-list { display: flex; flex-direction: column; gap: 6px; }
  .task { display: flex; align-items: flex-start; gap: 10px; padding: 9px 11px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.08); background: #fafafa; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .task:active { background: #ebebea; }
  .task.done { opacity: 0.5; }
  .task.done .task-title { text-decoration: line-through; }
  .task-check { width: 18px; height: 18px; border-radius: 50%; border: 2px solid #ccc; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
  .task.done .task-check { background: #3B6D11; border-color: #3B6D11; }
  .task-check::after { content: ''; display: none; width: 5px; height: 8px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px,-1px); }
  .task.done .task-check::after { display: block; }
  .task-body { flex: 1; }
  .task-title { font-size: 13px; font-weight: 500; line-height: 1.4; }
  .task-note { font-size: 11px; color: #888; margin-top: 2px; }
  .task-tag { font-size: 10px; font-weight: 600; padding: 1px 7px; border-radius: 10px; flex-shrink: 0; margin-top: 2px; }
  .tag-done { background: #EAF3DE; color: #3B6D11; }
  .tag-next { background: #EEEDFE; color: #534AB7; }
  .tag-idea { background: #FAEEDA; color: #854F0B; }
  .commit-list { display: flex; flex-direction: column; gap: 6px; }
  .commit { display: flex; gap: 10px; align-items: flex-start; padding: 9px 11px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.07); background: #fafafa; text-decoration: none; color: inherit; }
  .commit:active { background: #ebebea; }
  .commit-sha { font-size: 10px; font-family: monospace; background: #E6F1FB; color: #185FA5; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; margin-top: 1px; }
  .commit-body { flex: 1; min-width: 0; }
  .commit-msg { font-size: 12px; font-weight: 500; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .commit-date { font-size: 11px; color: #999; margin-top: 2px; }
  .commit-status { font-size: 12px; color: #999; padding: 6px 0; }
  .refresh-btn { font-size: 11px; color: #185FA5; background: none; border: 0.5px solid #85B7EB; border-radius: 6px; padding: 3px 10px; cursor: pointer; }
  .note-area { width: 100%; min-height: 70px; border: 0.5px solid #ddd; border-radius: 8px; padding: 10px; font-size: 13px; font-family: inherit; resize: vertical; background: #fafafa; color: #1a1a1a; }
  .note-area:focus { outline: none; border-color: #85B7EB; }
  .save-btn { margin-top: 8px; background: #185FA5; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; cursor: pointer; font-family: inherit; width: 100%; }
  .saved-msg { font-size: 11px; color: #3B6D11; margin-top: 6px; display: none; text-align: center; }
</style>
</head>
<body>

<h1>🏠 SUMIKA <span class="badge">開発中</span></h1>
<div class="subtitle">
  新築・分譲物件サーチ — 東京・神奈川・千葉<br>
  <a href="https://andupllc.github.io/sumika/" style="color:#185FA5">andupllc.github.io/sumika/</a>
</div>

<div class="links">
  <a class="link-btn" href="https://andupllc.github.io/sumika/" target="_blank">🌐 本番サイト</a>
  <a class="link-btn" href="https://github.com/ANDUPLLC/sumika" target="_blank">⬡ GitHub</a>
  <a class="link-btn" href="https://github.com/ANDUPLLC/sumika/commits/main" target="_blank">📋 コミット</a>
</div>

<div class="section">
  <div class="section-title" style="margin-bottom:10px">進捗</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel"></div>
</div>

<div class="section">
  <div class="section-title" style="margin-bottom:10px">タスク</div>
  <div class="task-list" id="taskList"></div>
</div>

<div class="section">
  <div class="section-header">
    <div class="section-title">最近のコミット</div>
    <button class="refresh-btn" onclick="loadCommits()">↺ 更新</button>
  </div>
  <div class="commit-list" id="commitList">
    <div class="commit-status">読み込み中…</div>
  </div>
</div>

<div class="section">
  <div class="section-title" style="margin-bottom:10px">メモ</div>
  <textarea class="note-area" id="noteArea" placeholder="アイデアや次にやること…"></textarea>
  <button class="save-btn" onclick="saveNote()">メモを保存</button>
  <div class="saved-msg" id="savedMsg">✓ 保存しました</div>
</div>

<script>
const TASKS_KEY = 'sumika_tasks_v1';
const NOTE_KEY  = 'sumika_note_v1';

const DEFAULT_TASKS = [
  { id: 1,  title: 'GitHubリポジトリ作成・GitHub Pages設定', note: '', tag: 'done', done: true },
  { id: 2,  title: '物件データ（properties-data.js）分離', note: '別ファイル管理でデータ更新が楽に', tag: 'done', done: true },
  { id: 3,  title: 'ファイル名を index.html にリネーム', note: 'URL: andupllc.github.io/sumika/', tag: 'done', done: true },
  { id: 4,  title: 'iPhoneヘッダー2行問題を修正', note: 'ボタン「更新」、日付表示、モバイルCSS追加', tag: 'done', done: true },
  { id: 5,  title: 'お気に入りボタンのトグル不具合を修正', note: 'iOS hoverバグ対応・タブ間同期', tag: 'done', done: true },
  { id: 6,  title: '物件データを最新情報に更新', note: '各社サイトから手動 or スクレイピングで', tag: 'next', done: false },
  { id: 7,  title: '物件に画像を追加', note: 'properties-data.js の img フィールドに URL を入れる', tag: 'next', done: false },
  { id: 8,  title: '物件件数を増やす（現在30件）', note: '', tag: 'next', done: false },
  { id: 9,  title: '「新着」バッジの日付ロジックを自動化', note: '掲載から30日以内を自動でNEW表示など', tag: 'idea', done: false },
  { id: 10, title: '物件の詳細ページ（モーダル）', note: '', tag: 'idea', done: false },
  { id: 11, title: 'Googleスプレッドシートでデータ管理', note: 'GASでJSONを自動生成→GitHubにプッシュ', tag: 'idea', done: false },
];

const TAG_LABEL = { done: '完了', next: '次にやる', idea: 'アイデア' };

function loadTasks() {
  try { const s = localStorage.getItem(TASKS_KEY); return s ? JSON.parse(s) : DEFAULT_TASKS; }
  catch { return DEFAULT_TASKS; }
}
function saveTasks(t) { localStorage.setItem(TASKS_KEY, JSON.stringify(t)); }

function renderTasks() {
  const tasks = loadTasks();
  const done = tasks.filter(t => t.done).length;
  document.getElementById('progressFill').style.width = (done / tasks.length * 100) + '%';
  document.getElementById('progressLabel').textContent = done + ' / ' + tasks.length + ' 完了';
  document.getElementById('taskList').innerHTML = tasks.map(t => `
    <div class="task ${t.done ? 'done' : ''}" onclick="toggle(${t.id})">
      <div class="task-check"></div>
      <div class="task-body">
        <div class="task-title">${t.title}</div>
        ${t.note ? `<div class="task-note">${t.note}</div>` : ''}
      </div>
      <span class="task-tag tag-${t.tag}">${TAG_LABEL[t.tag]}</span>
    </div>
  `).join('');
}

function toggle(id) {
  const tasks = loadTasks();
  const t = tasks.find(x => x.id === id);
  if (t) { t.done = !t.done; saveTasks(tasks); renderTasks(); }
}

function saveNote() {
  localStorage.setItem(NOTE_KEY, document.getElementById('noteArea').value);
  const msg = document.getElementById('savedMsg');
  msg.style.display = 'block';
  setTimeout(() => msg.style.display = 'none', 2000);
}

function formatDate(iso) {
  const d = new Date(iso), now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'たった今';
  if (diff < 3600) return Math.floor(diff / 60) + '分前';
  if (diff < 86400) return Math.floor(diff / 3600) + '時間前';
  if (diff < 86400 * 7) return Math.floor(diff / 86400) + '日前';
  return (d.getMonth() + 1) + '/' + d.getDate();
}

async function loadCommits() {
  const el = document.getElementById('commitList');
  el.innerHTML = '<div class="commit-status">読み込み中…</div>';
  try {
    const res = await fetch('https://api.github.com/repos/ANDUPLLC/sumika/commits?per_page=8');
    if (!res.ok) throw new Error();
    const commits = await res.json();
    el.innerHTML = commits.map(c => `
      <a class="commit" href="${c.html_url}" target="_blank">
        <span class="commit-sha">${c.sha.substring(0, 7)}</span>
        <div class="commit-body">
          <div class="commit-msg">${c.commit.message.split('\n')[0]}</div>
          <div class="commit-date">${formatDate(c.commit.author.date)}</div>
        </div>
      </a>
    `).join('');
  } catch {
    el.innerHTML = '<div class="commit-status" style="color:#c00">読み込み失敗</div>';
  }
}

const savedNote = localStorage.getItem(NOTE_KEY);
if (savedNote) document.getElementById('noteArea').value = savedNote;
renderTasks();
loadCommits();
</script>
</body>
</html>
